<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Mashup Creator - 102303673</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder,
        input[type="number"]::placeholder {
            color: #999;
        }

        .input-help {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.error ul {
            margin-left: 20px;
            margin-top: 8px;
        }

        .message.error li {
            margin-bottom: 4px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background-color: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #1565c0;
            margin-bottom: 24px;
        }

        .info-box strong {
            display: block;
            margin-bottom: 4px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 YouTube Mashup Creator</h1>
            <p>Roll Number: 102303673</p>
        </div>

        <div class="info-box">
            <strong>How it works:</strong>
            Submit the form and you'll receive your mashup via email as a zip file.
        </div>

        <form id="mashupForm">
            <div class="form-group">
                <label for="singerName">Singer Name *</label>
                <input 
                    type="text" 
                    id="singerName" 
                    name="singerName" 
                    placeholder="e.g., Sharry Maan, Arijit Singh"
                    required
                >
                <div class="input-help">Enter the singer's name whose videos to download</div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="numVideos">Number of Videos *</label>
                    <input 
                        type="number" 
                        id="numVideos" 
                        name="numVideos" 
                        placeholder="20"
                        min="11"
                        required
                    >
                    <div class="input-help">Must be > 10</div>
                </div>

                <div class="form-group">
                    <label for="duration">Duration (seconds) *</label>
                    <input 
                        type="number" 
                        id="duration" 
                        name="duration" 
                        placeholder="30"
                        min="21"
                        required
                    >
                    <div class="input-help">Must be > 20 seconds</div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="your.email@example.com"
                    required
                >
                <div class="input-help">Result will be sent to this email</div>
            </div>

            <button type="submit" id="submitBtn">Create Mashup</button>

            <div id="message" class="message"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('mashupForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous messages
            messageDiv.classList.remove('success', 'error');
            messageDiv.innerHTML = '';
            
            // Disable button and show spinner
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Processing...';
            
            try {
                const formData = {
                    singerName: document.getElementById('singerName').value,
                    numVideos: document.getElementById('numVideos').value,
                    duration: document.getElementById('duration').value,
                    email: document.getElementById('email').value
                };

                const response = await fetch('/api/create-mashup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.classList.add('success');
                    messageDiv.innerHTML = `✓ ${data.message}`;
                    form.reset();
                } else {
                    messageDiv.classList.add('error');
                    if (data.errors && Array.isArray(data.errors)) {
                        messageDiv.innerHTML = '<strong>Please fix the following errors:</strong><ul>';
                        data.errors.forEach(error => {
                            messageDiv.innerHTML += `<li>${error}</li>`;
                        });
                        messageDiv.innerHTML += '</ul>';
                    } else {
                        messageDiv.innerHTML = `<strong>Error:</strong> ${data.error || 'An error occurred'}`;
                    }
                }
            } catch (error) {
                messageDiv.classList.add('error');
                messageDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Create Mashup';
            }
        });

        // Real-time validation
        document.getElementById('numVideos').addEventListener('change', (e) => {
            const val = parseInt(e.target.value);
            if (val <= 10) {
                e.target.style.borderColor = '#dc3545';
            } else {
                e.target.style.borderColor = '#e0e0e0';
            }
        });

        document.getElementById('duration').addEventListener('change', (e) => {
            const val = parseInt(e.target.value);
            if (val <= 20) {
                e.target.style.borderColor = '#dc3545';
            } else {
                e.target.style.borderColor = '#e0e0e0';
            }
        });
    </script>
</body>
</html>
